name: Build KeePassium IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
     
      - name: Setup Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          sudo xcodebuild -runFirstLaunch
          
          # Wake up and initialize the CoreSimulator daemon silently
          xcrun simctl list > /dev/null
          
          # Now download the platform
          xcodebuild -downloadPlatform iOS
          
          xcodebuild -version


      - name: Auto-generate Xcode Schemes
        run: |
         gem install xcodeproj
         ruby -e "require 'xcodeproj'; project = Xcodeproj::Project.open('KeePassium.xcodeproj'); project.recreate_user_schemes; project.save"
      - name: Cache Swift Package Manager
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('**/*.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-
      - name: Resolve SPM Dependencies
        run: |
         xcodebuild -resolvePackageDependencies \
         -workspace "KeePassium.xcworkspace" \
         -scheme "KeePassium"

      - name: Build KeePassium
        run: |
          xcodebuild build \
            -workspace "KeePassium.xcworkspace" \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -scheme "KeePassium" \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SUPPORTS_MACCATALYST=NO \
            2>&1 | tee build.log | tail -50

          # 检查是否成功
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "=== BUILD FAILED - Last 200 lines ==="
            tail -200 build.log
            echo "=== Error lines ==="
            grep -i "error:" build.log | tail -30
            exit 1
          fi

      - name: Install ldid
        run: brew install ldid

      - name: Package TIPA for TrollStore
        run: |
          APP_PATH=$(find ./build -name "KeePassium.app" -path "*/Release-iphoneos/*" -not -path "*/PlugIns/*" | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "KeePassium.app not found, listing all .app:"
            find ./build -name "*.app" | head -20
            APP_PATH=$(find ./build -name "*.app" -path "*/Release-iphoneos/*" -not -path "*/PlugIns/*" | head -1)
          fi

          echo "App path: $APP_PATH"

          # Fakesign 主二进制
          APP_NAME=$(basename "$APP_PATH" .app)
          [ -f "$APP_PATH/$APP_NAME" ] && ldid -S "$APP_PATH/$APP_NAME"

          # Fakesign frameworks
          find "$APP_PATH/Frameworks" -name "*.dylib" 2>/dev/null | while read f; do
            ldid -S "$f" || true
          done

          # Fakesign 插件
          find "$APP_PATH/PlugIns" -name "*.appex" 2>/dev/null | while read appex; do
            pname=$(basename "$appex" .appex)
            [ -f "$appex/$pname" ] && ldid -S "$appex/$pname" || true
          done

          # 打包
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r KeePassium.tipa Payload
          echo "Done! Size: $(du -h KeePassium.tipa | cut -f1)"
      - name: Package IPA
        run: |
          # Find the compiled .app file
          APP_PATH=$(find ./build -name "KeePassium.app" -path "*/Release-iphoneos/*" -not -path "*/PlugIns/*" | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "KeePassium.app not found, listing all .app:"
            find ./build -name "*.app" | head -20
            APP_PATH=$(find ./build -name "*.app" -path "*/Release-iphoneos/*" -not -path "*/PlugIns/*" | head -1)
          fi

          echo "App path: $APP_PATH"

          # Create Payload directory structure and zip it as .ipa
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r KeePassium.ipa Payload
          
          echo "Done! Size: $(du -h KeePassium.ipa | cut -f1)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: KeePassium-ipa
          path: KeePassium.ipa

      - name: Upload TIPA
        uses: actions/upload-artifact@v4
        with:
          name: KeePassium-TrollStore
          path: KeePassium.tipa
